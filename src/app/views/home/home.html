<div class="mt-12 p-6 bg-slate-900 text-white">
  <!-- TOP CARDS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">

    <!-- Customers -->
    <div class="bg-slate-800 p-5 rounded-2xl shadow">
      <p class="text-gray-400">Categories</p>
      <div class="flex justify-between items-center mt-2">
        <h2 class="text-2xl font-bold">{{ totalCategories }}</h2>
          <span class="bg-emerald-500/20 text-emerald-400 text-xs px-2 py-1 rounded-full">
          ↑ 11.01%
          </span>
      </div>
    </div>

    <!-- Orders -->
    <div class="bg-slate-800 p-5 rounded-2xl shadow">
      <p class="text-gray-400">Users</p>
      <div class="flex justify-between items-center mt-2">
        <h2 class="text-2xl font-bold">5,359</h2>
        <span class="bg-red-500/20 text-red-400 text-xs px-2 py-1 rounded-full">
          ↓ 9.05%
          </span>
      </div>
    </div>

    <!-- Monthly Target -->
    <div class="bg-slate-800 p-5 rounded-2xl shadow flex flex-col items-center justify-center">
      <h3 class="text-gray-400 mb-2">Monthly Target</h3>
      <canvas id="gaugeChart"></canvas>
      <p class="mt-2 text-green-400">+10%</p>
    </div>

  </div>

  <!-- SALES CHART -->
  <div class="bg-slate-800 p-5 rounded-2xl shadow">
    <h2 class="text-lg font-semibold mb-4">Monthly Sales</h2>
    <canvas id="salesChart"></canvas>
  </div>
</div>
