<div class="mt-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
  @for (item of categories; track item.categoryId) {
    <div class="bg-slate-800/80 backdrop-blur border border-slate-700 rounded-xl overflow-hidden shadow-md hover:shadow-xl hover:-translate-y-1 transition-all duration-300">

      <div class="p-6">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold text-white text-lg">
            {{ item.name }}
          </h2>

          <span class="bg-emerald-500/20 text-emerald-400 text-xs px-2 py-1 rounded-full">
            {{ item.isActive }}
          </span>
        </div>

        <p class="text-sm text-slate-400 mt-2">
          {{ item.description }}
        </p>
      </div>

      <div class="grid grid-cols-2 border-t border-slate-700">

        <button
          routerLink="/categories/update/{{ item.categoryId }}"
          class="flex items-center justify-center gap-2 p-4 text-indigo-400 hover:bg-indigo-500/10 hover:text-indigo-300 transition">
          Edit
        </button>

        <button
          routerLink="/categories/delete/{{ item.categoryId }}"
          class="flex items-center justify-center gap-2 p-4 border-l border-slate-700 text-red-400 hover:bg-red-500/10 hover:text-red-300 transition">
          Delete
        </button>
      </div>
    </div>
  }
</div>
