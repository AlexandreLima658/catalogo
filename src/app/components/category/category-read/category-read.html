<div class="mt-12 grid grid-cols-2 lg:grid-cols-4 gap-4">
  @for (item of categories; track item.categoryId) {
    <div class="bg-gray-700 text-white rounded-xl overflow-hidden">
      <div class="grid auto-cols-max items-center p-6 gap-4">
        <div>
          <div class="flex items-center gap-2">
            <h2 class="font-semibold text-lg">{{ item.name }}</h2>
            <span class="bg-green-500/20 text-green-400 text-xs px-2 py-0.5 rounded-full">
              {{ item.isActive }}
            </span>
          </div>
          <p class="text-sm text-gray-400">
            {{ item.description }}
          </p>
        </div>
      </div>
      <div class="grid grid-cols-2 border-t border-gray-500">
        <button routerLink="/categories/update/{{ item.categoryId }}"
          class="flex items-center justify-center gap-2 p-4 hover:bg-blue-400">
           Edit
        </button>
        <button routerLink="/categories/delete/{{ item.categoryId }}"
            class="flex items-center justify-center gap-2 p-4 border-l border-gray-500 hover:bg-red-500">
           Delete
        </button>
      </div>
    </div>
  }
</div>
