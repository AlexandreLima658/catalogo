<div class="max-w-xl mx-auto mt-10 bg-slate-800/60 border border-red-500/30 rounded-xl shadow-lg p-6 backdrop-blur">

  <h2 class="text-2xl font-bold mb-4 text-red-400">
    Delete Category
  </h2>

  <p class="text-slate-400 mb-6 text-sm">
    This action cannot be undone. Are you sure you want to delete this category?
  </p>

  <form [formGroup]="form" class="flex flex-col gap-4">

    <input formControlName="name"
      readonly
      class="bg-slate-900/50 border border-slate-700 text-slate-400 p-3 rounded-lg cursor-not-allowed">

    <input formControlName="description"
      readonly
      class="bg-slate-900/50 border border-slate-700 text-slate-400 p-3 rounded-lg cursor-not-allowed">

    <div class="flex gap-3 mt-4">

      <button (click)="deleteCategory()"
        [disabled]="form.invalid"
        type="button"
        class="flex-1 bg-red-600 hover:bg-red-500
               text-white font-semibold py-2 rounded-lg
               shadow-md hover:shadow-lg transition
               disabled:opacity-50 disabled:cursor-not-allowed">
        Delete
      </button>

      <button (click)="cancel()"
        type="button"
        class="flex-1 bg-slate-700 hover:bg-slate-600 text-white
               py-2 rounded-lg transition">
        Cancel
      </button>

    </div>
  </form>
</div>
