<div class="max-w-xl mx-auto mt-10 bg-slate-800/60 border border-slate-700 rounded-xl shadow-lg p-6 backdrop-blur">

  <h2 class="text-2xl font-bold mb-6
             bg-gradient-to-r from-indigo-400 to-purple-400
             bg-clip-text text-transparent">
    New Category
  </h2>

  <form class="flex flex-col gap-4">

    <input [(ngModel)]="category.name"
      name="name"
      required
      placeholder="Name"
      class="bg-slate-900/60 border border-slate-600 text-white placeholder-slate-400 p-3 rounded-lg
             focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">

    <input [(ngModel)]="category.description"
      name="description"
      placeholder="Description"
      class="bg-slate-900/60 border border-slate-600 text-white placeholder-slate-400 p-3 rounded-lg
             focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition">

    <div class="flex gap-3 mt-4">

      <button (click)="createCategory()"
        type="button"
        class="flex-1 bg-gradient-to-r from-indigo-500 to-blue-500
               hover:from-indigo-400 hover:to-blue-400
               text-white font-semibold py-2 rounded-lg
               shadow-md hover:shadow-lg transition">
        Save
      </button>

      <button (click)="cancel()"
        type="button"
        class="flex-1 bg-slate-700 hover:bg-slate-600 text-white
               py-2 rounded-lg transition">
        Cancel
      </button>

    </div>
  </form>
</div>
